<svg viewBox="0 0 1000 800" xmlns="http://www.w3.org/2000/svg">
  <rect width="1000" height="800" fill="#041226" rx="20"/>
  
  <text x="500" y="50" font-family="Rajdhani, sans-serif" font-size="28" fill="#00d4ff" text-anchor="middle" font-weight="bold">KOS ULTIMATE 2026: MODULAR RESTRUCTURE</text>

  <rect x="400" y="80" width="200" height="60" rx="8" fill="#1c1c1e" stroke="#00d4ff" stroke-width="3"/>
  <text x="500" y="115" font-family="monospace" font-size="18" fill="#fff" text-anchor="middle">index.html</text>

  <g transform="translate(50, 160)">
    <rect width="400" height="180" rx="12" fill="rgba(94, 92, 230, 0.15)" stroke="#5e5ce6" stroke-width="2"/>
    <text x="200" y="-15" font-family="sans-serif" font-size="16" fill="#5e5ce6" text-anchor="middle" font-weight="bold">CORE SYSTEM STYLES</text>
    <text x="30" y="40" font-family="monospace" font-size="14" fill="#fff">📄 core-vars.css (Colors/Glows)</text>
    <text x="30" y="75" font-family="monospace" font-size="14" fill="#fff">📄 shell.css (Boot/Login/Desktop)</text>
    <text x="30" y="110" font-family="monospace" font-size="14" fill="#fff">📄 dock.css (Icon Animations)</text>
    <text x="30" y="145" font-family="monospace" font-size="14" fill="#fff">📄 wm.css (Windows/Snapping)</text>

    <g transform="translate(0, 220)">
      <rect width="400" height="350" rx="12" fill="rgba(255,255,255,0.05)" stroke="#5e5ce6" stroke-dasharray="6"/>
      <text x="30" y="35" font-family="sans-serif" font-size="16" fill="#5e5ce6" font-weight="bold">📁 css/apps/</text>
      <text x="50" y="70" font-family="monospace" font-size="13" fill="#82b9d7">📄 browser.css</text>
      <text x="50" y="100" font-family="monospace" font-size="13" fill="#82b9d7">📄 ui-manager.css</text>
      <text x="50" y="130" font-family="monospace" font-size="13" fill="#82b9d7">📄 task-mgr.css</text>
      <text x="50" y="160" font-family="monospace" font-size="13" fill="#82b9d7">📄 photos.css</text>
      <text x="50" y="190" font-family="monospace" font-size="13" fill="#82b9d7">📄 calculator.css</text>
      <text x="50" y="220" font-family="monospace" font-size="13" fill="#82b9d7">📄 studio.css</text>
      <text x="50" y="250" font-family="monospace" font-size="13" fill="#82b9d7">📄 spotlight.css</text>
    </g>
  </g>

  <g transform="translate(550, 160)">
    <rect width="400" height="180" rx="12" fill="rgba(191, 90, 242, 0.15)" stroke="#bf5af2" stroke-width="2"/>
    <text x="200" y="-15" font-family="sans-serif" font-size="16" fill="#bf5af2" text-anchor="middle" font-weight="bold">CORE SYSTEM LOGIC</text>
    <text x="30" y="40" font-family="monospace" font-size="14" fill="#fff">📄 kos-kernel.js (The Registry)</text>
    <text x="30" y="75" font-family="monospace" font-size="14" fill="#fff">📄 kos-manifest.js (Master List)</text>
    <text x="30" y="110" font-family="monospace" font-size="14" fill="#fff">📄 kos-wm.js (Window Manager)</text>
    <text x="30" y="145" font-family="monospace" font-size="14" fill="#fff">📄 kos-init.js (Bootloader)</text>

    <g transform="translate(0, 220)">
      <rect width="400" height="350" rx="12" fill="rgba(255,255,255,0.05)" stroke="#bf5af2" stroke-dasharray="6"/>
      <text x="30" y="35" font-family="sans-serif" font-size="16" fill="#bf5af2" font-weight="bold">📁 apps/</text>
      <text x="50" y="70" font-family="monospace" font-size="13" fill="#82b9d7">📄 browser.js</text>
      <text x="50" y="100" font-family="monospace" font-size="13" fill="#82b9d7">📄 ui-manager.js</text>
      <text x="50" y="130" font-family="monospace" font-size="13" fill="#82b9d7">📄 task-mgr.js</text>
      <text x="50" y="160" font-family="monospace" font-size="13" fill="#82b9d7">📄 photos.js</text>
      <text x="50" y="190" font-family="monospace" font-size="13" fill="#82b9d7">📄 calculator.js</text>
      <text x="50" y="220" font-family="monospace" font-size="13" fill="#82b9d7">📄 studio.js</text>
      <text x="50" y="250" font-family="monospace" font-size="13" fill="#82b9d7">📄 spotlight.js</text>
    </g>
  </g>

  <line x1="450" y1="250" x2="550" y2="250" stroke="#00d4ff" stroke-width="2" stroke-dasharray="8"/>
  <line x1="450" y1="480" x2="550" y2="480" stroke="#00d4ff" stroke-width="1" stroke-opacity="0.5"/>
</svg>
